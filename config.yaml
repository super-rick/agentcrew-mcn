# ============================================================
# AgentCrew MCN Configuration
# ============================================================

llm:
  provider: deepseek
  api_key: ${DEEPSEEK_API_KEY}
  base_url: https://api.deepseek.com/v1
  model: deepseek-v4-pro
  temperature: 0.8
  max_tokens: 8192

agents:
  writer:
    enabled: true
    default_skill: trending_writing
  publisher:
    enabled: true
    default_platforms: [juejin]
  analyst:
    enabled: true
    default_days: 7
    history_file: data/post_history.json

platforms:
  juejin:
    cookie: ${JUEJIN_COOKIE}
  zhihu:
    cookie: ${ZHIHU_COOKIE}
  devto:
    api_key: ${DEVTO_API_KEY}

rag:
  enabled: true
  chroma_persist_dir: data/chroma
  embedding_model: deepseek
  collection_name: agentcrew_mcn_kb

orchestrator:
  schedule_interval_min: 120
  schedule_jitter_min: 30

logging:
  level: INFO
  file: data/logs/agentcrew-mcn.log
