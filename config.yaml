# ============================================================
# AgentCrew MCN Configuration
# ============================================================

llm:
  provider: deepseek
  api_key: ${DEEPSEEK_API_KEY}
  base_url: https://api.deepseek.com/v1
  model: deepseek-v4-pro
  temperature: 0.8
  max_tokens: 8192

agents:
  writer:
    enabled: true
    default_skill: trending_writing
  publisher:
    enabled: true
    default_platforms: [juejin]
  analyst:
    enabled: true
    default_days: 7
    history_file: data/post_history.json

platforms:
  juejin:
    cookie: ${JUEJIN_COOKIE}
  zhihu:
    cookie: ${ZHIHU_COOKIE}
  devto:
    api_key: ${DEVTO_API_KEY}

rag:
  enabled: true

  # Embedding 服务配置（OpenAI 兼容协议，可切换 provider）
  embedding:
    provider: openai                       # 协议类型：openai | [future] local | grpc
    model: BAAI/bge-large-zh-v1.5          # 硅基流动中文 embedding 模型
    api_key: ${EMBEDDING_API_KEY}          # API Key
    base_url: https://api.siliconflow.cn/v1

  # 向量库
  chroma_persist_dir: data/chroma
  collection_name: agentcrew_mcn_kb

orchestrator:
  schedule_interval_min: 120
  schedule_jitter_min: 30

logging:
  level: INFO
  file: data/logs/agentcrew-mcn.log


# ============================================================
# MCP (Model Context Protocol) Configuration
# ============================================================
# MCP allows AgentCrew to:
#   - Expose tools as an MCP server (for Claude Desktop, Continue, etc.)
#   - Connect to external MCP servers to extend agent capabilities

mcp:
  # Server: expose AgentCrew tools to external AI apps
  server:
    enabled: false              # Set true to start MCP server via `agentcrew-mcn mcp serve`
    transport: stdio            # stdio (recommended for desktop apps) | sse
    host: 127.0.0.1             # for SSE transport
    port: 8090                  # for SSE transport

  # Clients: connect to external MCP servers (experimental)
  # Tools from these servers are auto-discovered and injected into WriterAgent
  clients: []
  # Example stdio client:
  #   - name: "filesystem"
  #     transport: stdio
  #     command: "npx"
  #     args: ["-y", "@modelcontextprotocol/server-filesystem", "/path/to/docs"]
  #     env:
  #       CUSTOM_VAR: value
  #
  # Example SSE client:
  #   - name: "weather"
  #     transport: sse
  #     url: "https://weather-mcp.example.com/sse"
  #     headers:
  #       Authorization: "Bearer ${TOKEN}"
