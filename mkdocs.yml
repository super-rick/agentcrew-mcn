site_name: AgentCrew MCN
site_description: AI MCN — Multi-Agent Content Marketing Automation | 多Agent内容营销自动化
site_url: https://super-rick.github.io/agentcrew-mcn/
repo_url: https://github.com/super-rick/agentcrew-mcn
repo_name: super-rick/agentcrew-mcn
theme:
  name: material
  language: en
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github
plugins:
  - search
markdown_extensions:
  - attr_list
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - toc:
      permalink: true
nav:
  - Getting Started: index.md
  - 中文文档: zh/index.md
  - Installation: installation.md
  - Writing: writing.md
  - Review: review.md
  - Publishing: publishing.md
  - Scheduling: scheduling.md
  - Platforms:
      - platforms/index.md
      - Juejin: platforms/juejin.md
      - Zhihu: platforms/zhihu.md
      - Dev.to: platforms/devto.md
      - CSDN: platforms/csdn.md
      - WeChat: platforms/wechat.md
      - SegmentFault: platforms/segmentfault.md
      - X/Twitter: platforms/twitter.md
      - Xiaohongshu: platforms/xiaohongshu.md
      - Medium: platforms/medium.md
  - Dashboard: dashboard.md
  - CLI Reference: cli-reference.md
  - FAQ: faq.md
